version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: scribble-postgres
    restart: always
    environment:
      POSTGRES_USER: scribble_user
      POSTGRES_PASSWORD: scribble_pass
      POSTGRES_DB: scribble_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: